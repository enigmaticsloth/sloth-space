// ═══════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════
const SCALE = { title: 0, h1: 1, h2: 2, body: 3, caption: 4, small: 5 };

function rs(role, p) {
  const h = p.typography.heading, b = p.typography.body;
  const m = {
    title: { color: p.colors.primary, ff: h.family, fw: h.weight, ls: h.letterSpacing },
    subtitle: { color: p.colors.secondary, ff: h.family, fw: 400 },
    heading: { color: p.colors.primary, ff: h.family, fw: h.weight, ls: h.letterSpacing },
    body: { color: p.colors.primary, ff: b.family, fw: b.weight, lh: b.lineHeight },
    caption: { color: p.colors.secondary, ff: b.family, fw: 400 },
    quote: { color: p.colors.primary, ff: h.family, fw: h.weight, fs: "italic", lh: 1.4 },
    author: { color: p.colors.primary, ff: b.family, fw: 700 },
    table: { color: p.colors.primary, ff: b.family, fw: b.weight },
  };
  return m[role] || m.body;
}

function bg(p, l) {
  const o = l.background_override;
  if (o === 'surface') return p.colors.surface;
  return p.colors.background;
}

function rc(content, role, p, region) {
  if (!content) return '';
  const s = rs(role, p);
  const sk = region.fontSize || 'body';
  const fs = p.typography.scale[SCALE[sk]] || 16;

  if (role === 'image') {
    if (typeof content === 'object' && content.type === 'image') {
      return `<div style="width:100%;height:100%;border:2px dashed ${p.colors.border};border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:${p.colors.surface};">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${p.colors.secondary}" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span style="font-family:Arial;font-size:12px;color:${p.colors.secondary};">${content.alt || content.src}</span>
      </div>`;
    }
    return '';
  }

  if (typeof content === 'object' && content.type === 'table') {
    const hBg = p.colors.table_header_bg, hT = p.colors.table_header_text;
    const alt = p.colors.table_row_alt, bc = p.colors.border, tc = p.colors.primary;
    const tf = fs * 0.9;
    let h = `<table style="width:100%;border-collapse:collapse;font-family:Arial;font-size:${tf}px;"><thead><tr>`;
    content.headers.forEach(x => { h += `<th style="background:${hBg};color:${hT};padding:12px 16px;text-align:left;font-weight:700;font-size:${tf*0.9}px;border-bottom:2px solid ${bc};">${x}</th>`; });
    h += '</tr></thead><tbody>';
    content.rows.forEach((r, i) => {
      h += `<tr style="background:${i%2===1?alt:'transparent'};">`;
      r.forEach((c, j) => { h += `<td style="padding:10px 16px;border-bottom:1px solid ${bc};color:${tc};font-weight:${j===0?500:400};">${c}</td>`; });
      h += '</tr>';
    });
    return h + '</tbody></table>';
  }

  if (typeof content === 'object' && content.type === 'list') {
    const g = p.spacing.paragraph;
    return content.items.map(item =>
      `<div style="display:flex;align-items:flex-start;margin-bottom:${g}px;font-size:${fs}px;color:${s.color};font-family:${s.ff};font-weight:${s.fw};line-height:${s.lh||1.5};">
        <span style="color:${p.colors.secondary};margin-right:14px;flex-shrink:0;font-size:7px;margin-top:${fs*0.4}px;">\u25CF</span>
        <span>${item}</span>
      </div>`
    ).join('');
  }

  if (typeof content === 'string') {
    let pre = '';
    if (role === 'quote') pre = `<span style="font-size:${fs*1.5}px;color:${p.colors.secondary};margin-right:2px;">\u201C</span>`;
    return `<div style="font-size:${fs}px;color:${s.color};font-family:${s.ff};font-weight:${s.fw};font-style:${s.fs||'normal'};line-height:${s.lh||1.3};letter-spacing:${s.ls||0}px;">${pre}${content}</div>`;
  }
  return '';
}

function renderSlide(slide, idx, p, total) {
  const L = LAYOUTS[slide.layout];
  if (!L) return '';
  const W = p.slide.width, H = p.slide.height, m = p.spacing.margin;
  let html = `<div style="width:${W}px;height:${H}px;position:relative;background:${bg(p,L)};overflow:hidden;">`;

  L.regions.forEach(r => {
    const c = slide.content[r.id];
    if (!c && r.optional) return;
    if (!c) return;
    const ax = m.left + r.bounds.x, ay = m.top + r.bounds.y;
    const al = r.align || {};
    const jc = al.vertical==='middle'?'center':al.vertical==='bottom'?'flex-end':'flex-start';
    html += `<div style="position:absolute;left:${ax}px;top:${ay}px;width:${r.bounds.w}px;height:${r.bounds.h}px;display:flex;flex-direction:column;justify-content:${jc};text-align:${al.horizontal||'left'};overflow:hidden;">`;
    html += rc(c, r.role, p, r);
    html += '</div>';
  });

  html += `<div style="position:absolute;bottom:${m.bottom*0.4}px;right:${m.right}px;font-family:Arial;font-size:${p.typography.scale[5]}px;color:${p.colors.secondary};opacity:0.4;">${idx+1}</div>`;
  html += '</div>';
  return html;
}

// ═══════════════════════════════════════════
// UI
// ═══════════════════════════════════════════
let curP = MANIFEST.preset, curS = 0;

function render() {
  const p = PRESETS[curP], s = MANIFEST.slides[curS], n = MANIFEST.slides.length;
  const maxW = Math.min(window.innerWidth - 40, 1280);
  const sc = maxW / p.slide.width;
  const cv = document.getElementById('slideCanvas');
  cv.style.width = (p.slide.width*sc)+'px';
  cv.style.height = (p.slide.height*sc)+'px';
  cv.innerHTML = `<div style="transform:scale(${sc});transform-origin:top left;width:${p.slide.width}px;height:${p.slide.height}px;">${renderSlide(s,curS,p,n)}</div>`;
  document.getElementById('slideLabel').textContent = `${curS+1}/${n}  |  layout: ${s.layout}  |  preset: ${curP}`;
  document.getElementById('speakerNotes').textContent = s.notes ? `Notes: ${s.notes}` : '';
  document.getElementById('slideNav').innerHTML = MANIFEST.slides.map((_,i) =>
    `<button class="${i===curS?'active':''}" onclick="go(${i})">${i+1}</button>`
  ).join('');
  document.getElementById('presetPicker').innerHTML = Object.values(PRESETS).map(pr =>
    `<button class="${pr.id===curP?'active':''}" onclick="sp('${pr.id}')">${pr.name}</button>`
  ).join('');
}
function go(i){curS=i;render();}
function sp(id){curP=id;render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){curS=Math.min(curS+1,MANIFEST.slides.length-1);render();e.preventDefault();}
  if(e.key==='ArrowLeft'){curS=Math.max(curS-1,0);render();e.preventDefault();}
});
window.addEventListener('resize',render);
render();
</script>
</body>
</html>
